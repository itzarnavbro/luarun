<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luarun</title>
<style>
  /* 1. RESET & BASE
     Clean slate. Everything starts from black. */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* 2. BODY
     Pure black background — not dark grey, not navy. Black.
     Courier New monospace everywhere for that terminal/code DNA. */
  body {
    font-family: 'Courier New', Courier, monospace;
    background: #080808;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* 3. CONTAINER
     Centered, max 960px. No white backgrounds, no rounded cards.
     Everything lives on black. */
  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  /* 4. HEADER
     The title glows red. No gradients, no backgrounds —
     just the word floating on black with a red text-shadow aura.
     This is the signature element: a glowing blood-red wordmark. */
  header {
    text-align: center;
    padding: 60px 0 50px;
    border-bottom: 1px solid #1a1a1a;
    margin-bottom: 50px;
  }

  header h1 {
    font-size: 3.5em;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #ff2d55;
    /* Red glow — the defining aesthetic moment */
    text-shadow:
      0 0 20px rgba(255, 45, 85, 0.8),
      0 0 40px rgba(255, 45, 85, 0.4),
      0 0 80px rgba(255, 45, 85, 0.2);
  }

  header p {
    margin-top: 12px;
    font-size: 0.75em;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
  }

  /* 5. TASKS GRID
     3 columns on desktop, 1 on mobile.
     Cards are dark panels with a red left border — like terminal windows. */
  .tasks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  /* 6. TASK CARD
     Dark panel. Left border is the accent — red line like a cursor.
     No border-radius: sharp edges match the terminal vibe. */
  .task-card {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-left: 3px solid #ff2d55;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Hover: red glow appears, card lifts slightly */
  .task-card:hover {
    border-color: #ff2d55;
    box-shadow: 0 0 20px rgba(255, 45, 85, 0.15), inset 0 0 20px rgba(255, 45, 85, 0.03);
    transform: translateY(-2px);
  }

  /* Running state: full red border, brighter glow */
  .task-card.running {
    border-color: #ff2d55;
    box-shadow: 0 0 30px rgba(255, 45, 85, 0.25);
  }

  /* 7. TASK NAME
     Clean, white, monospace. Like a function name. */
  .task-name {
    font-size: 1.1em;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.05em;
  }

  /* 8. STATUS BADGE
     Tiny pill. Idle = dark grey. Running = red pulse. Success = dim green. Error = red. */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    font-size: 0.65em;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid currentColor;
  }

  .status-idle    { color: #444; }
  .status-running { color: #ff2d55; animation: pulse-border 1s ease-in-out infinite; }
  .status-success { color: #2dff7a; }
  .status-error   { color: #ff2d55; }

  @keyframes pulse-border {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* 9. RUN BUTTON
     Solid red. Sharp corners. No gradients.
     Active press gives a slight inset feel. */
  .task-button {
    background: #ff2d55;
    color: #000;
    border: none;
    padding: 10px 20px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8em;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    align-self: flex-start;
  }

  .task-button:hover:not(:disabled) {
    background: #ff0040;
    box-shadow: 0 0 20px rgba(255, 45, 85, 0.5);
  }

  .task-button:active:not(:disabled) {
    transform: scale(0.97);
  }

  .task-button:disabled {
    background: #2a0a12;
    color: #ff2d55;
    cursor: not-allowed;
  }

  /* 10. SPINNER
     Red ring. Matches the button color. */
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid rgba(255, 45, 85, 0.3);
    border-top-color: #ff2d55;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 11. OUTPUT PANEL
     The centerpiece. Pure black terminal.
     Red prompt >, monospace output, lines appear one by one.
     This is where the starboy aesthetic really lives. */
  .output-section {
    background: #000;
    border: 1px solid #1e1e1e;
    border-left: 3px solid #ff2d55;
    padding: 28px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.875em;
    line-height: 1.8;
    max-height: 500px;
    overflow-y: auto;
    /* Custom scrollbar — red thumb on dark track */
    scrollbar-width: thin;
    scrollbar-color: #ff2d55 #0f0f0f;
  }

  .output-section::-webkit-scrollbar { width: 4px; }
  .output-section::-webkit-scrollbar-track { background: #0f0f0f; }
  .output-section::-webkit-scrollbar-thumb { background: #ff2d55; }

  .output-section.hidden { display: none; }

  /* The red > prompt label */
  .output-header {
    color: #ff2d55;
    font-size: 0.7em;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1a1a1a;
  }

  /* Each line of output animates in from the left */
  .output-line {
    white-space: pre-wrap;
    word-break: break-word;
    color: #c0c0c0;
    opacity: 0;
    animation: fadein 0.2s ease forwards;
  }

  .output-line.cmd {
    color: #ff2d55;
    margin-bottom: 8px;
  }

  .output-line.success-line { color: #2dff7a; }
  .output-line.error-line   { color: #ff2d55; }

  @keyframes fadein {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* 12. FOOTER */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid #1a1a1a;
    text-align: center;
    font-size: 0.65em;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
  }

  /* 13. RESPONSIVE */
  @media (max-width: 600px) {
    header h1 { font-size: 2.2em; }
    .tasks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>luarun</h1>
    <p>Cross-Platform Task Runner</p>
  </header>

  <main>
    <div class="tasks-grid" id="tasks"></div>

    <div class="output-section hidden" id="output">
      <div class="output-header">&#62; output</div>
      <div id="output-content"></div>
    </div>
  </main>

  <footer>luarun &mdash; task runner</footer>

</div>

<script>
  // API_BASE is relative — works both locally and on any server
  const API_BASE = '/api';
  const taskStates = {};

  // Fetch tasks from the Lua backend and render cards
  async function fetchTasks() {
    try {
      const res = await fetch(API_BASE + '/tasks');
      const data = await res.json();
      renderTasks(data.tasks);
    } catch (e) {
      console.error('Failed to fetch tasks:', e);
      setTimeout(fetchTasks, 2000);
    }
  }

  function renderTasks(tasks) {
    const container = document.getElementById('tasks');
    container.innerHTML = '';
    tasks.forEach(name => {
      const state = taskStates[name] || { running: false, lastOutput: '', status: 'idle' };
      const card = document.createElement('div');
      card.className = 'task-card' + (state.running ? ' running' : '');

      // Build button content based on state
      const btnContent = state.running
        ? `<span class="spinner"></span> running...`
        : `&#62; run`;

      card.innerHTML = `
        <div class="task-name">${escapeHtml(name)}</div>
        <span class="status-badge status-${state.status}">
          ${state.running ? '<span class="spinner"></span>' : ''}
          ${state.status}
        </span>
        <button class="task-button" ${state.running ? 'disabled' : ''} onclick="runTask('${name}')">
          ${btnContent}
        </button>
      `;

      // Click card body to re-show last output
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('task-button')) return;
        if (!state.running && state.lastOutput) showOutput(name, state.lastOutput, state.status);
      });

      container.appendChild(card);
    });
  }

  async function runTask(taskName) {
    const state = taskStates[taskName] || {};
    if (state.running) return;

    state.running = true;
    state.status = 'running';
    state.lastOutput = '';
    taskStates[taskName] = state;

    // Show output panel immediately with running indicator
    showOutput(taskName, '', 'running');
    renderTasks(Object.keys(taskStates).length ? await getTaskNames() : [taskName]);

    try {
      const res = await fetch(API_BASE + '/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: taskName })
      });
      const data = await res.json();
      state.lastOutput = data.output || '';
      state.status = data.success ? 'success' : 'error';
      showOutput(taskName, state.lastOutput, state.status);
    } catch (e) {
      state.lastOutput = 'Connection error: ' + e.message;
      state.status = 'error';
      showOutput(taskName, state.lastOutput, 'error');
    } finally {
      state.running = false;
      taskStates[taskName] = state;
      fetchTasks();
    }
  }

  async function getTaskNames() {
    try {
      const res = await fetch(API_BASE + '/tasks');
      const data = await res.json();
      return data.tasks || [];
    } catch (e) { return []; }
  }

  // Render output panel with animated lines
  function showOutput(taskName, output, status) {
    const panel = document.getElementById('output');
    const content = document.getElementById('output-content');
    panel.classList.remove('hidden');

    const lines = output ? output.split('\n').filter(l => l.trim()) : [];
    const statusClass = status === 'success' ? 'success-line' : status === 'error' ? 'error-line' : '';

    let html = `<div class="output-line cmd" style="animation-delay:0ms">&#62; luarun ${escapeHtml(taskName)}</div>`;

    if (status === 'running') {
      html += `<div class="output-line" style="animation-delay:100ms"><span class="spinner"></span> executing...</div>`;
    } else if (lines.length === 0) {
      html += `<div class="output-line ${statusClass}" style="animation-delay:100ms">${status === 'success' ? 'done.' : 'no output.'}</div>`;
    } else {
      lines.forEach((line, i) => {
        html += `<div class="output-line ${statusClass}" style="animation-delay:${(i + 1) * 80}ms">${escapeHtml(line)}</div>`;
      });
    }

    content.innerHTML = html;
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function escapeHtml(text) {
    return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  }

  fetchTasks();
  setInterval(fetchTasks, 5000);
</script>
</body>
</html>
