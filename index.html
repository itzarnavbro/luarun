<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>luarun · Task Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        main {
            padding: 40px;
            min-height: 400px;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .task-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .task-card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transform: translateY(-4px);
        }

        .task-card.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .task-card.running {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .task-name {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 12px;
            color: inherit;
        }

        .task-status {
            font-size: 0.85em;
            opacity: 0.7;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .task-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .task-card.running .task-button {
            background: white;
            color: #667eea;
        }

        .task-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .task-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .output-section {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
            margin-top: 30px;
            border: 2px solid #e9ecef;
        }

        .output-section.hidden {
            display: none;
        }

        .output-header {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .output-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            display: inline-flex;
            align-items: center;
        }

        .error {
            color: #e74c3c;
        }

        .success {
            color: #27ae60;
        }

        footer {
            background: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e9ecef;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .status-idle {
            background: #e8f4f8;
            color: #0c5c7a;
        }

        .status-running {
            background: #fff3cd;
            color: #856404;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            main {
                padding: 20px;
            }

            .tasks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>luarun</h1>
            <p>Cross-Platform Task Runner Dashboard</p>
        </header>

        <main>
            <div class="tasks-grid" id="tasks"></div>
            <div class="output-section hidden" id="output">
                <div class="output-header">Output</div>
                <div id="output-content"></div>
            </div>
        </main>

        <footer>
            <p>luarun • Beautiful task running interface</p>
        </footer>
    </div>

    <script>
        const API_BASE = '/api';
        const taskStates = {};

        async function fetchTasks() {
            try {
                const response = await fetch(API_BASE + '/tasks');
                const data = await response.json();
                renderTasks(data.tasks);
            } catch (e) {
                console.error('Failed to fetch tasks:', e);
                setTimeout(fetchTasks, 2000);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasks');
            container.innerHTML = '';

            tasks.forEach(taskName => {
                const state = taskStates[taskName] || { running: false, lastOutput: '', status: 'idle' };
                const card = document.createElement('div');
                card.className = 'task-card' + (state.running ? ' running' : '');

                card.innerHTML = `
                    <div class="task-name">${escapeHtml(taskName)}</div>
                    <div class="task-status">
                        <span class="status-badge status-${state.status}">
                            ${state.running ? '<span class="spinner"></span>' : ''}
                            ${state.status.toUpperCase()}
                        </span>
                    </div>
                    <button class="task-button" ${state.running ? 'disabled' : ''} onclick="runTask('${taskName}')">
                        ${state.running ? '<span class="loading-text"><span class="spinner"></span>Running...</span>' : 'Run Task'}
                    </button>
                `;

                card.addEventListener('click', () => {
                    if (!state.running && state.lastOutput) {
                        showOutput(taskName, state.lastOutput);
                    }
                });

                container.appendChild(card);
            });
        }

        async function runTask(taskName) {
            const state = taskStates[taskName] || {};
            if (state.running) return;

            state.running = true;
            state.status = 'running';
            state.lastOutput = '';
            taskStates[taskName] = state;
            renderTasks(await getTasks());

            try {
                const response = await fetch(API_BASE + '/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task: taskName })
                });

                const data = await response.json();
                state.lastOutput = data.output;
                state.status = data.success ? 'success' : 'error';
                showOutput(taskName, state.lastOutput);
            } catch (e) {
                state.lastOutput = 'Error: ' + e.message;
                state.status = 'error';
                showOutput(taskName, state.lastOutput);
            } finally {
                state.running = false;
                taskStates[taskName] = state;
                renderTasks(await getTasks());
            }
        }

        async function getTasks() {
            try {
                const response = await fetch(API_BASE + '/tasks');
                return await response.json();
            } catch (e) {
                return { tasks: [] };
            }
        }

        function showOutput(taskName, output) {
            const outputDiv = document.getElementById('output');
            const contentDiv = document.getElementById('output-content');
            contentDiv.innerHTML = `<div class="output-line"><strong>$ luarun ${escapeHtml(taskName)}</strong></div><div class="output-line">${escapeHtml(output)}</div>`;
            outputDiv.classList.remove('hidden');
            outputDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        fetchTasks();
        setInterval(fetchTasks, 5000);
    </script>
</body>
</html>
